task: ru_drop
dataset_path: AvitoTech/ru_drop
output_type: generate_until
test_split: test
process_docs: !function utils.process_docs
doc_to_text: "Текст: {{passage}}\nВопрос: {{question}}\nРазмышляй по шагам. В конце выведи только:\n####\n<ответ>"
doc_to_target: "{{ answer|join(',')}}"
target_delimiter: ""
process_results: !function utils.process_results
should_decontaminate: true
doc_to_decontamination_query: "{{passage}} {{question}}"
metric_list:
  - metric: em
    aggregation: mean
    higher_is_better: true
  - metric: f1
    aggregation: mean
    higher_is_better: true
metadata:
  version: 3.3
